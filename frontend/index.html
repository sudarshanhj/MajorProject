    <script>
      (function() {
        try {
          const store = JSON.parse(localStorage.getItem('stego-store'));
          const theme = store && store.state && store.state.theme ? store.state.theme : 'dark';
          document.documentElement.classList.add(theme);
          document.documentElement.style.backgroundColor = theme === 'light' ? '#f0f4f8' : '#020202';
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#020202';
        }
      })();
    </script>
